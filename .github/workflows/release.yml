name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to package
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6
      - name: Resolve and validate release tag
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then TAG="${INPUT_TAG}"; fi
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "${TAG}" != "v${VERSION}" ]]; then
            echo "Tag ${TAG} does not match package version v${VERSION}." >&2
            exit 1
          fi
          npm run verify:version
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            command: npm run package:win
            artifact: windows
          - os: macos-latest
            command: npm run package:mac
            artifact: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run checks
        run: npm test
      - name: Build release packages
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - name: Upload release packages
        uses: actions/upload-artifact@v4
        with:
          name: echodeck-${{ matrix.artifact }}
          path: |
            release/*.exe
            release/*.dmg
            release/*.zip
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: [verify, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
        run: gh release create "${TAG}" artifacts/* --verify-tag --generate-notes --title "EchoDeck ${TAG}"
